<!DOCTYPE html>
<html>
<head>
  <title>Dialer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      background: #000;
      color: white;
      overflow: hidden; /* 🚫 no scrolling */
    }

    .screen {
      display: none;
      height: 100vh;
      box-sizing: border-box;
    }

    .show {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* DISPLAY */
    #display {
      font-size: 32px;
      padding: 15px;
      text-align: center;
      background: #000;
      color: #00ffcc;
      border: none;
      outline: none;
    }

    /* KEYPAD */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 10px;
      flex-grow: 1;
    }

    .btn {
      background: #ffffff; /* HIGH CONTRAST */
      color: #000;
      border-radius: 50%;
      font-size: 22px;
      font-weight: bold;
      height: 65px;
    }

    .btn:active {
      transform: scale(0.9);
    }

    .call {
      background: #34c759;
      color: white;
    }

    .back {
      background: #ff3b30;
      color: white;
    }

    /* ACTION ROW */
    .actions {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding-bottom: 10px;
    }

    /* CONTACTS */
    .list {
      overflow-y: auto;
      flex-grow: 1;
    }

    .contact {
      padding: 12px;
      border-bottom: 1px solid #222;
    }

    input {
      width: 90%;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    /* NAV */
    .nav {
      display: flex;
      background: #111;
    }

    .nav button {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      color: white;
      font-size: 14px;
    }
  </style>
</head>

<body>

<!-- DIALER -->
<div id="dialer" class="screen show">
  <input id="display" readonly>

  <div class="grid">
    <button class="btn" onclick="add('1')">1</button>
    <button class="btn" onclick="add('2')">2</button>
    <button class="btn" onclick="add('3')">3</button>
    <button class="btn" onclick="add('4')">4</button>
    <button class="btn" onclick="add('5')">5</button>
    <button class="btn" onclick="add('6')">6</button>
    <button class="btn" onclick="add('7')">7</button>
    <button class="btn" onclick="add('8')">8</button>
    <button class="btn" onclick="add('9')">9</button>
    <button class="btn" onclick="add('*')">*</button>
    <button class="btn" onclick="add('0')">0</button>
    <button class="btn" onclick="add('#')">#</button>
  </div>

  <div class="actions">
    <button class="btn back" onclick="backspace()">⌫</button>
    <button class="btn call" onclick="callNumber()">📞</button>
  </div>

  <div class="nav">
    <button onclick="tab('dialer')">Dial</button>
    <button onclick="tab('contacts')">Contacts</button>
    <button onclick="tab('add')">Add</button>
    <button onclick="tab('history')">Recents</button>
  </div>
</div>

<!-- CONTACTS -->
<div id="contacts" class="screen">
  <input placeholder="Search..." oninput="searchContacts(this.value)">
  <div class="list" id="contactList"></div>

  <div class="nav">
    <button onclick="tab('dialer')">Dial</button>
    <button onclick="tab('contacts')">Contacts</button>
    <button onclick="tab('add')">Add</button>
    <button onclick="tab('history')">Recents</button>
  </div>
</div>

<!-- ADD -->
<div id="add" class="screen">
  <input id="name" placeholder="Name">
  <input id="number" placeholder="Number">
  <button onclick="addContact()">Save</button>

  <div class="nav">
    <button onclick="tab('dialer')">Dial</button>
    <button onclick="tab('contacts')">Contacts</button>
    <button onclick="tab('add')">Add</button>
    <button onclick="tab('history')">Recents</button>
  </div>
</div>

<!-- HISTORY -->
<div id="history" class="screen">
  <div class="list" id="historyList"></div>

  <div class="nav">
    <button onclick="tab('dialer')">Dial</button>
    <button onclick="tab('contacts')">Contacts</button>
    <button onclick="tab('add')">Add</button>
    <button onclick="tab('history')">Recents</button>
  </div>
</div>

<script>
let contacts = JSON.parse(localStorage.getItem("contacts")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];

// SWITCH
function tab(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("show"));
  document.getElementById(id).classList.add("show");
}

// DIAL
function add(n) {
  display.value += n;
}

function backspace() {
  display.value = display.value.slice(0, -1);
}

// CALL
function callNumber() {
  let num = display.value;
  if (!num) return;

  history.unshift({ num, time: new Date().toLocaleTimeString() });
  localStorage.setItem("history", JSON.stringify(history));
  loadHistory();

  window.location.href = "https://pranav2431.app.n8n.cloud/webhook/4310849b-abe9-4390-96ff-20e442643ce1?number=6366889281" + num;
}

// CONTACTS
function addContact() {
  let name = document.getElementById("name").value;
  let number = document.getElementById("number").value;

  if (!name || !number) return;

  contacts.push({ name, number });
  contacts.sort((a,b)=>a.name.localeCompare(b.name));

  localStorage.setItem("contacts", JSON.stringify(contacts));
  loadContacts();
}

function loadContacts() {
  contactList.innerHTML = contacts.map(c => `
    <div class="contact" onclick="select('${c.number}')">
      <b>${c.name}</b><br>${c.number}
    </div>
  `).join("");
}

function searchContacts(q) {
  let f = contacts.filter(c =>
    c.name.toLowerCase().includes(q.toLowerCase())
  );

  contactList.innerHTML = f.map(c => `
    <div class="contact" onclick="select('${c.number}')">
      ${c.name}
    </div>
  `).join("");
}

function select(num) {
  display.value = num;
  tab('dialer');
}

// HISTORY
function loadHistory() {
  historyList.innerHTML = history.map(h => `
    <div class="contact" onclick="select('${h.num}')">
      ${h.num} - ${h.time}
    </div>
  `).join("");
}

loadContacts();
loadHistory();
</script>

</body>
</html>
