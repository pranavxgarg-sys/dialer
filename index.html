<!DOCTYPE html>
<html>
<head>
  <title>Smart Dialer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #000;
      color: white;
    }

    header {
      padding: 15px;
      font-size: 20px;
      text-align: center;
      background: #111;
    }

    .tabs {
      display: flex;
      justify-content: space-around;
      background: #111;
    }

    .tabs button {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      color: white;
      font-size: 16px;
    }

    .active {
      border-bottom: 2px solid lime;
    }

    .screen {
      display: none;
      padding: 10px;
    }

    .show {
      display: block;
    }

    #display {
      width: 100%;
      font-size: 30px;
      padding: 10px;
      text-align: center;
      background: black;
      color: lime;
      border: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    button {
      padding: 18px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: #222;
      color: white;
    }

    .call {
      background: green;
    }

    .contact {
      padding: 10px;
      border-bottom: 1px solid #333;
      text-align: left;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>

<body>

<header>📞 Smart Dialer</header>

<div class="tabs">
  <button onclick="tab('dialer')">Dial</button>
  <button onclick="tab('contacts')">Contacts</button>
  <button onclick="tab('add')">Add</button>
  <button onclick="tab('history')">History</button>
</div>

<!-- DIALER -->
<div id="dialer" class="screen show">
  <input id="display" readonly>

  <div class="grid">
    <button onclick="add('1')">1</button>
    <button onclick="add('2')">2</button>
    <button onclick="add('3')">3</button>
    <button onclick="add('4')">4</button>
    <button onclick="add('5')">5</button>
    <button onclick="add('6')">6</button>
    <button onclick="add('7')">7</button>
    <button onclick="add('8')">8</button>
    <button onclick="add('9')">9</button>
    <button onclick="add('*')">*</button>
    <button onclick="add('0')">0</button>
    <button onclick="add('#')">#</button>
  </div>

  <br>
  <button class="call" onclick="callNumber()">📞 Call</button>
  <button onclick="clearNum()">❌</button>
</div>

<!-- CONTACTS -->
<div id="contacts" class="screen">
  <input placeholder="Search..." oninput="searchContacts(this.value)">
  <div id="contactList"></div>
</div>

<!-- ADD CONTACT -->
<div id="add" class="screen">
  <input id="name" placeholder="Name">
  <input id="number" placeholder="Number">
  <button onclick="addContact()">Save Contact</button>
</div>

<!-- HISTORY -->
<div id="history" class="screen">
  <div id="historyList"></div>
</div>

<script>
let contacts = JSON.parse(localStorage.getItem("contacts")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];

function tab(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("show"));
  document.getElementById(id).classList.add("show");
}

function add(n) {
  display.value += n;
}

function clearNum() {
  display.value = "";
}

function callNumber() {
  let num = display.value;
  if (!num) return;

  history.unshift({ num, time: new Date().toLocaleTimeString() });
  localStorage.setItem("history", JSON.stringify(history));
  loadHistory();

  window.location.href = "https://pranav2431.app.n8n.cloud/webhook/4310849b-abe9-4390-96ff-20e442643ce1?number=6366889281" + num;
}

function addContact() {
  let name = document.getElementById("name").value;
  let number = document.getElementById("number").value;

  if (!name || !number) return;

  contacts.push({ name, number });

  // 🔥 SORT ALPHABETICALLY
  contacts.sort((a, b) => a.name.localeCompare(b.name));

  localStorage.setItem("contacts", JSON.stringify(contacts));

  document.getElementById("name").value = "";
  document.getElementById("number").value = "";

  loadContacts();
}

function loadContacts() {
  let html = "";
  contacts.forEach(c => {
    html += `
      <div class="contact" onclick="select('${c.number}')">
        <b>${c.name}</b><br>${c.number}
      </div>
    `;
  });
  contactList.innerHTML = html;
}

function searchContacts(q) {
  let filtered = contacts.filter(c =>
    c.name.toLowerCase().includes(q.toLowerCase())
  );

  let html = "";
  filtered.forEach(c => {
    html += `<div class="contact" onclick="select('${c.number}')">
      <b>${c.name}</b><br>${c.number}
    </div>`;
  });

  contactList.innerHTML = html;
}

function select(num) {
  display.value = num;
  tab('dialer');
}

function loadHistory() {
  historyList.innerHTML = history.map(h =>
    `<div class="contact" onclick="select('${h.num}')">
      ${h.num} - ${h.time}
    </div>`
  ).join("");
}

loadContacts();
loadHistory();
</script>

</body>
</html>
