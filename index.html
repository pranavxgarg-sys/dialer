<!DOCTYPE html>
<html>
<head>
  <title>Dialer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      background: #000;
      color: white;
    }

    .screen {
      display: none;
      padding-bottom: 80px;
      animation: fade 0.2s ease;
    }

    .show {
      display: block;
    }

    @keyframes fade {
      from {opacity:0; transform: translateX(10px);}
      to {opacity:1; transform: translateX(0);}
    }

    #display {
      width: 100%;
      font-size: 36px;
      padding: 20px;
      text-align: center;
      background: black;
      border: none;
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      padding: 15px;
    }

    .btn {
      background: #1c1c1e;
      border-radius: 50%;
      height: 70px;
      font-size: 22px;
    }

    .btn:active {
      transform: scale(0.9);
    }

    .call {
      background: #34c759;
    }

    .back {
      background: #333;
    }

    .contact {
      display: flex;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #222;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #444;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 10px;
      font-weight: bold;
    }

    .fav {
      margin-left: auto;
      font-size: 18px;
      color: gold;
      cursor: pointer;
    }

    input {
      width: 90%;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      background: #111;
    }

    .nav button {
      flex: 1;
      padding: 15px;
      background: none;
      border: none;
      color: white;
    }
  </style>
</head>

<body>

<!-- DIALER -->
<div id="dialer" class="screen show">
  <input id="display" readonly>

  <div class="grid">
    <button class="btn" onclick="add('1')">1</button>
    <button class="btn" onclick="add('2')">2</button>
    <button class="btn" onclick="add('3')">3</button>
    <button class="btn" onclick="add('4')">4</button>
    <button class="btn" onclick="add('5')">5</button>
    <button class="btn" onclick="add('6')">6</button>
    <button class="btn" onclick="add('7')">7</button>
    <button class="btn" onclick="add('8')">8</button>
    <button class="btn" onclick="add('9')">9</button>
    <button class="btn" onclick="add('*')">*</button>
    <button class="btn" onclick="add('0')">0</button>
    <button class="btn" onclick="add('#')">#</button>
  </div>

  <div style="display:flex; justify-content:center; gap:20px;">
    <button class="btn back" onclick="backspace()">⌫</button>
    <button class="btn call" onclick="callNumber()">📞</button>
  </div>
</div>

<!-- CONTACTS -->
<div id="contacts" class="screen">
  <input placeholder="Search..." oninput="searchContacts(this.value)">
  <h3 style="margin-left:10px;">⭐ Favorites</h3>
  <div id="favList"></div>

  <h3 style="margin-left:10px;">All Contacts</h3>
  <div id="contactList"></div>
</div>

<!-- ADD -->
<div id="add" class="screen">
  <input id="name" placeholder="Name">
  <input id="number" placeholder="Number">
  <button onclick="addContact()">Save</button>
</div>

<!-- HISTORY -->
<div id="history" class="screen">
  <div id="historyList"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="tab('dialer')">Dial</button>
  <button onclick="tab('contacts')">Contacts</button>
  <button onclick="tab('add')">Add</button>
  <button onclick="tab('history')">Recents</button>
</div>

<script>
let contacts = JSON.parse(localStorage.getItem("contacts")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];

// TAB SWITCH
function tab(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("show"));
  document.getElementById(id).classList.add("show");
}

// DIALER
function add(n) {
  display.value += n;
}

function backspace() {
  display.value = display.value.slice(0, -1);
}

// CALL
function callNumber() {
  let num = display.value;
  if (!num) return;

  history.unshift({ num, time: new Date().toLocaleTimeString() });
  localStorage.setItem("history", JSON.stringify(history));
  loadHistory();

  window.location.href = "https://pranav2431.app.n8n.cloud/webhook/4310849b-abe9-4390-96ff-20e442643ce1?number=6366889281" + num;
}

// ADD CONTACT
function addContact() {
  let name = document.getElementById("name").value;
  let number = document.getElementById("number").value;

  if (!name || !number) return;

  contacts.push({ name, number, fav:false });
  contacts.sort((a,b)=>a.name.localeCompare(b.name));

  localStorage.setItem("contacts", JSON.stringify(contacts));
  loadContacts();
}

// FAVORITE
function toggleFav(i) {
  contacts[i].fav = !contacts[i].fav;
  localStorage.setItem("contacts", JSON.stringify(contacts));
  loadContacts();
}

// LOAD CONTACTS
function loadContacts() {
  let favHTML = "";
  let allHTML = "";

  contacts.forEach((c,i) => {
    let initial = c.name.charAt(0).toUpperCase();

    let item = `
      <div class="contact">
        <div class="avatar">${initial}</div>
        <div onclick="select('${c.number}')">
          <b>${c.name}</b><br>${c.number}
        </div>
        <div class="fav" onclick="toggleFav(${i})">
          ${c.fav ? "★":"☆"}
        </div>
      </div>
    `;

    if (c.fav) favHTML += item;
    allHTML += item;
  });

  favList.innerHTML = favHTML || "No favorites";
  contactList.innerHTML = allHTML;
}

// SEARCH
function searchContacts(q) {
  let filtered = contacts.filter(c =>
    c.name.toLowerCase().includes(q.toLowerCase())
  );

  contactList.innerHTML = filtered.map(c => `
    <div class="contact" onclick="select('${c.number}')">
      ${c.name}
    </div>
  `).join("");
}

// SELECT
function select(num) {
  display.value = num;
  tab('dialer');
}

// HISTORY
function loadHistory() {
  historyList.innerHTML = history.map(h =>
    `<div class="contact" onclick="select('${h.num}')">
      ${h.num} - ${h.time}
    </div>`
  ).join("");
}

loadContacts();
loadHistory();
</script>

</body>
</html>

</body>
</html>
