<!DOCTYPE html>
<html>
<head>
  <title>Dialer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      background: #000;
      color: white;
      overflow-x: hidden;
    }

    .screen {
      position: absolute;
      width: 100%;
      transition: all 0.25s ease;
      opacity: 0;
      transform: translateX(20px);
      padding-bottom: 80px;
    }

    .show {
      opacity: 1;
      transform: translateX(0);
    }

    #display {
      width: 100%;
      font-size: 38px;
      padding: 20px;
      text-align: center;
      background: black;
      border: none;
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      padding: 15px;
    }

    .btn {
      background: #1c1c1e;
      border-radius: 50%;
      height: 75px;
      font-size: 22px;
      position: relative;
      overflow: hidden;
    }

    .btn:active {
      transform: scale(0.9);
    }

    .call {
      background: #34c759;
    }

    .back {
      background: #333;
    }

    .contact {
      display: flex;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #222;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #444;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 10px;
      font-weight: bold;
    }

    .fav {
      margin-left: auto;
      font-size: 18px;
      color: gold;
    }

    input {
      width: 90%;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      background: #111;
    }

    .nav button {
      flex: 1;
      padding: 15px;
      background: none;
      border: none;
      color: white;
    }
  </style>
</head>

<body>

<!-- DIALER -->
<div id="dialer" class="screen show">
  <input id="display" readonly>

  <div class="grid">
    ${[1,2,3,4,5,6,7,8,9,'*',0,'#'].map(n => 
      `<button class="btn" onclick="add('${n}')">${n}</button>`
    ).join('')}
  </div>

  <div style="display:flex; justify-content:center; gap:20px;">
    <button class="btn back" onclick="backspace()" 
      oncontextmenu="clearAll(); return false;">⌫</button>
    <button class="btn call" onclick="callNumber()">📞</button>
  </div>
</div>

<!-- CONTACTS -->
<div id="contacts" class="screen">
  <input placeholder="Search..." oninput="searchContacts(this.value)">
  <h3 style="margin-left:10px;">⭐ Favorites</h3>
  <div id="favList"></div>

  <h3 style="margin-left:10px;">All Contacts</h3>
  <div id="contactList"></div>
</div>

<!-- ADD -->
<div id="add" class="screen">
  <input id="name" placeholder="Name">
  <input id="number" placeholder="Number">
  <button onclick="addContact()">Save</button>
</div>

<!-- HISTORY -->
<div id="history" class="screen">
  <div id="historyList"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="tab('dialer')">Dial</button>
  <button onclick="tab('contacts')">Contacts</button>
  <button onclick="tab('add')">Add</button>
  <button onclick="tab('history')">Recents</button>
</div>

<script>
let contacts = JSON.parse(localStorage.getItem("contacts")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];

// TAB
function tab(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("show"));
  document.getElementById(id).classList.add("show");
}

// VIBRATION
function vibrate() {
  if (navigator.vibrate) navigator.vibrate(10);
}

// DIAL
function add(n) {
  display.value += n;
  vibrate();
}

function backspace() {
  display.value = display.value.slice(0, -1);
}

function clearAll() {
  display.value = "";
}

// CALL
function callNumber() {
  let num = display.value;
  if (!num) return;

  history.unshift({ num, time: new Date().toLocaleTimeString() });
  localStorage.setItem("history", JSON.stringify(history));
  loadHistory();

  window.location.href = "https://pranav2431.app.n8n.cloud/webhook/4310849b-abe9-4390-96ff-20e442643ce1?number=6366889281" + num;
}

// ADD CONTACT
function addContact() {
  let name = document.getElementById("name").value;
  let number = document.getElementById("number").value;

  if (!name || !number) return;

  contacts.push({ name, number, fav:false });
  contacts.sort((a,b)=>a.name.localeCompare(b.name));

  localStorage.setItem("contacts", JSON.stringify(contacts));
  loadContacts();
}

// FAVORITE
function toggleFav(i) {
  contacts[i].fav = !contacts[i].fav;
  localStorage.setItem("contacts", JSON.stringify(contacts));
  loadContacts();
}

// LOAD CONTACTS
function loadContacts() {
  let favHTML="", allHTML="";

  contacts.forEach((c,i)=>{
    let initial = c.name.charAt(0).toUpperCase();

    let item = `
    <div class="contact" 
      onmousedown="startDelete(${i})" 
      onmouseup="cancelDelete()">
      <div class="avatar">${initial}</div>
      <div onclick="select('${c.number}')">
        <b>${c.name}</b><br>${c.number}
      </div>
      <div class="fav" onclick="toggleFav(${i})">
        ${c.fav ? "★":"☆"}
      </div>
    </div>`;

    if(c.fav) favHTML += item;
    allHTML += item;
  });

  favList.innerHTML = favHTML || "No favorites";
  contactList.innerHTML = allHTML;
}

// SEARCH
function searchContacts(q){
  let f = contacts.filter(c=>c.name.toLowerCase().includes(q.toLowerCase()));
  contactList.innerHTML = f.map(c=>`
    <div class="contact" onclick="select('${c.number}')">
      ${c.name}
    </div>
  `).join("");
}

// SELECT
function select(num){
  display.value = num;
  tab('dialer');
}

// HISTORY
function loadHistory(){
  historyList.innerHTML = history.map(h=>`
    <div class="contact" onclick="select('${h.num}')">
      ${h.num} - ${h.time}
    </div>
  `).join("");
}

// LONG PRESS DELETE
let deleteTimer;
function startDelete(i){
  deleteTimer = setTimeout(()=>{
    if(confirm("Delete contact?")){
      contacts.splice(i,1);
      localStorage.setItem("contacts", JSON.stringify(contacts));
      loadContacts();
    }
  },800);
}
function cancelDelete(){
  clearTimeout(deleteTimer);
}

loadContacts();
loadHistory();
</script>

</body>
</html>
