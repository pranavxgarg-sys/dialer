<!DOCTYPE html>

<html>
<head>
  <title>Exotel Dialer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
 <link rel="manifest" href="manifest.json">
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    #display {
      font-size: 28px;
      padding: 15px;
      width: 90%;
      margin: 20px auto;
      background: black;
      border: none;
      color: lime;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 90%;
      margin: auto;
    }

    button {
      padding: 20px;
      font-size: 20px;
      border-radius: 10px;
      border: none;
      background: #333;
      color: white;
    }

    button:active {
      background: #555;
    }

    .call {
      background: green;
    }

    .contacts {
      margin-top: 20px;
    }

    .contact-btn {
      width: 90%;
      padding: 10px;
      margin: 5px;
      background: #222;
    }
  </style>

</head>

<body>

<h2>📞 Exotel Dialer</h2>

<input id="display" readonly>

<div class="grid">
  <button onclick="add('1')">1</button>
  <button onclick="add('2')">2</button>
  <button onclick="add('3')">3</button>
  <button onclick="add('4')">4</button>
  <button onclick="add('5')">5</button>
  <button onclick="add('6')">6</button>
  <button onclick="add('7')">7</button>
  <button onclick="add('8')">8</button>
  <button onclick="add('9')">9</button>
  <button onclick="add('*')">*</button>
  <button onclick="add('0')">0</button>
  <button onclick="add('#')">#</button>
</div>

<br>

<button class="call" onclick="callNumber()">📞 Call</button> <button onclick="clearNum()">❌ Clear</button>

<div class="contacts">
  <h3>Saved Contacts</h3>

<button class="contact-btn" onclick="setNumber('9876543210')">Rahul</button> <button class="contact-btn" onclick="setNumber('9123456780')">Aman</button> <button class="contact-btn" onclick="setNumber('9988776655')">Client A</button>

</div>

<script>
function add(num) {
  document.getElementById("display").value += num;
}

function clearNum() {
  document.getElementById("display").value = "";
}

function setNumber(num) {
  document.getElementById("display").value = num;
}

function callNumber() {
  var num = document.getElementById("display").value;

  var url = "https://pranav2431.app.n8n.cloud/webhook/4310849b-abe9-4390-96ff-20e442643ce1?number=6366889281" + num;

  window.location.href = url;
}
</script>

</body>
</html>
